<!-- @startingPoint section="Website" subtitle="Gutsy Women Foundation marketing homepage" viewport="1280x720" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gutsy Women Foundation</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-body); color: var(--gwf-ink); background: #fff; }
  .kit-mobile-toggle { display: none; }
  @media (max-width: 860px) {
    .kit-hero-grid, .kit-featured, .kit-news, .kit-footer-grid { grid-template-columns: 1fr !important; }
    .kit-hero-photos { display: none !important; }
    .kit-stat-grid, .kit-pillar-grid { grid-template-columns: 1fr 1fr !important; }
    .kit-apply-grid { grid-template-columns: 1fr !important; }
    .kit-desktop-nav { display: none !important; }
    .kit-mobile-toggle { display: inline-flex !important; }
  }
  @media (max-width: 520px) {
    .kit-stat-grid, .kit-pillar-grid { grid-template-columns: 1fr !important; }
  }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react" src="./Icon.jsx"></script>
  <script type="text/babel" data-presets="react" src="./Nav.jsx"></script>
  <script type="text/babel" data-presets="react" src="./Hero.jsx"></script>
  <script type="text/babel" data-presets="react" src="./Sections.jsx"></script>
  <script type="text/babel" data-presets="react" src="./Footer.jsx"></script>
  <script type="text/babel" data-presets="react" src="./Apply.jsx"></script>
  <script type="text/babel" data-presets="react" src="./App.jsx"></script>
  <script type="text/babel" data-presets="react">
    (function mount() {
      if (!window.GWF || !window.GWF.App) { setTimeout(mount, 40); return; }
      const App = window.GWF.App;
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    })();
  </script>
</body>
</html>
