<!-- @dsCard group="Type" viewport="700x180" name="Display — Montserrat" subtitle="ExtraBold, uppercase, tight" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 20px 24px; color: var(--text-body); }
  .h1 { font: var(--display-1); text-transform: uppercase; letter-spacing: var(--tracking-tight); margin: 0 0 6px; }
  .h2 { font: var(--display-2); text-transform: uppercase; margin: 0 0 6px; }
  .h3 { font: var(--display-3); text-transform: uppercase; margin: 0; color: var(--gwf-purple-600); }
  .swoosh { color: var(--gwf-purple-600); position: relative; }
  .swoosh::after { content:""; position:absolute; left:0; right:0; bottom:2px; height:6px; background:var(--gwf-gold-500); border-radius:6px; opacity:.9; }
  .meta { font: var(--text-xs); color: var(--text-muted); margin-top: 12px; }
</style>
</head>
<body>
  <div class="h1"><span class="swoosh">Gutsy Women</span></div>
  <div class="h2">Turning Dreams Into Reality</div>
  <div class="h3">What We Do</div>
  <div class="meta">Montserrat 800 · uppercase · letter-spacing −0.01em · line-height 0.98–1.06</div>
</body>
</html>
