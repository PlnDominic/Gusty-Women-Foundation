<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); display: flex; }
  .half { flex: 1; display: flex; align-items: center; justify-content: center; height: 200px; }
  .light { background: var(--surface-page); }
  .dark { background: linear-gradient(135deg, var(--gwf-purple-600), var(--gwf-purple-900)); }
  img { height: 64px; }
  .dark img { filter: brightness(0) invert(1); opacity: .96; }
</style>
</head>
<body>
  <div class="half light"><img src="../assets/logo-lockup.png" alt="GWF logo" /></div>
  <div class="half dark"><img src="../assets/logo-lockup.png" alt="GWF logo on purple" /></div>
</body>
</html>
