<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 22px 24px; }
  .row { display: flex; gap: 18px; align-items: center; }
  .box { width: 92px; height: 92px; background: #fff; box-shadow: var(--shadow-md); display: flex; align-items: flex-end; justify-content: center; padding-bottom: 8px; box-sizing: border-box; font: var(--text-xs); color: var(--text-muted); }
  .pill { width: 120px; height: 44px; border-radius: var(--radius-pill); background: var(--gwf-purple-600); color: #fff; display: flex; align-items: center; justify-content: center; font: var(--text-xs); font-weight: 700; box-shadow: var(--shadow-sm); }
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="border-radius:var(--radius-md)">md 14</div>
    <div class="box" style="border-radius:var(--radius-lg)">lg 22</div>
    <div class="box" style="border-radius:var(--radius-xl)">xl 32</div>
    <div class="pill">pill 9999</div>
    <div class="box" style="box-shadow:var(--shadow-lg);border-radius:var(--radius-md)">shadow lg</div>
  </div>
</body>
</html>
