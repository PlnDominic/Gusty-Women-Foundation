<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 22px 24px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--gwf-purple-600); border-radius: 4px; width: 26px; }
  .lab { font: var(--text-xs); color: var(--text-muted); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="lab">1 · 4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="lab">2 · 8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="lab">3 · 12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="lab">4 · 16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="lab">5 · 24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="lab">6 · 32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="lab">7 · 48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="lab">8 · 64</div></div>
  </div>
</body>
</html>
