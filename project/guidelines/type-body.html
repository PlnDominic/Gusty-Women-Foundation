<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); padding: 20px 24px; color: var(--text-body); }
  .eyebrow { font: var(--label-eyebrow); text-transform: uppercase; letter-spacing: var(--tracking-eyebrow); color: var(--gwf-magenta-600); margin-bottom: 10px; }
  .lead { font: var(--text-lead); color: var(--text-soft); margin: 0 0 8px; max-width: 60ch; }
  .base { font: var(--text-base); margin: 0 0 8px; max-width: 64ch; }
  .sm { font: var(--text-sm); color: var(--text-muted); margin: 0; }
</style>
</head>
<body>
  <div class="eyebrow">Theme</div>
  <p class="lead">For young women ready to move beyond dreaming and start building.</p>
  <p class="base">The Mentorship Program Masterclass equips you with mentorship, training, networking and leadership to ignite, build and scale your ideas.</p>
  <p class="sm">14px small · used for captions, meta and helper text · line-height 1.55</p>

</html>
