<!-- @dsCard group="Colors" viewport="700x150" name="Accents — Gold & Magenta" subtitle="Spark + secondary pop" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-page); }
  .row { display: flex; gap: 8px; padding: 18px; }
  .sw { flex: 1; height: 96px; border-radius: 10px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; box-sizing: border-box; }
  .sw b { font: var(--text-xs); font-weight: 700; }
  .sw span { font: var(--text-xs); opacity: .85; }
  .dark { color: #fff; } .light { color: var(--gwf-ink); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw light" style="background:var(--gwf-gold-500)"><b>Gold 500 · Accent</b><span>#F5C518</span></div>
    <div class="sw light" style="background:var(--gwf-gold-300)"><b>Gold 300</b><span>#FADF73</span></div>
    <div class="sw dark" style="background:var(--gwf-magenta-600)"><b>Magenta 600 · Secondary</b><span>#C2185B</span></div>
    <div class="sw dark" style="background:var(--gwf-magenta-400)"><b>Magenta 400</b><span>#E0457F</span></div>
  </div>
</body>
</html>
