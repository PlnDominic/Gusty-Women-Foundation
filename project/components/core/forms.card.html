<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: #fff; padding: 26px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; max-width: 640px; }
  hr { border: none; border-top: 1px solid var(--border-subtle); margin: 24px 0; }
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, SectionHeading } = window.GutsyWomenFoundationDesignSystem_dd7d23;
    function Demo() {
      return (
        <div>
          <SectionHeading eyebrow="What We Do" title="Our Four Pillars" />
          <hr />
          <div className="grid">
            <Input label="Full name" placeholder="Ama Mensah" required />
            <Input label="Email" type="email" placeholder="you@example.com" required />
            <Input label="Location" placeholder="Accra, Ghana" />
            <Input label="Phone" placeholder="+233 ..." hint="We'll only use this for programme updates." />
          </div>
          <div style={{marginTop:18, maxWidth:640}}>
            <Input label="Why do you want to join Cohort 2?" multiline rows={3} placeholder="Tell us about the idea you want to build..." />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
